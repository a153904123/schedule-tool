<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>日程管理工具</title>
<meta name="theme-color" content="#4f6ef7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日程管理">
<meta name="description" content="简洁高效的个人日程管理工具">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='36' fill='%234f6ef7'/><rect x='32' y='42' width='128' height='118' rx='14' fill='white'/><rect x='32' y='42' width='128' height='32' rx='14' fill='%23eef0ff'/><rect x='32' y='56' width='128' height='18' fill='%23eef0ff'/><line x1='48' y1='88' x2='96' y2='88' stroke='%234f6ef7' stroke-width='6' stroke-linecap='round'/><line x1='48' y1='108' x2='120' y2='108' stroke='%23e2e8f0' stroke-width='6' stroke-linecap='round'/><line x1='48' y1='128' x2='80' y2='128' stroke='%23e2e8f0' stroke-width='6' stroke-linecap='round'/><circle cx='124' cy='90' r='12' fill='%23ef4444'/><text x='124' y='95' text-anchor='middle' fill='white' font-size='16' font-weight='bold'>1</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --sidebar-w:220px;
  --sidebar-bg:#1e1e2d;
  --sidebar-hover:#28283c;
  --sidebar-active:#323248;
  --sidebar-text:#a2a3b7;
  --sidebar-text-active:#fff;
  --primary:#4f6ef7;
  --primary-light:#eef0ff;
  --bg:#f0f2f5;
  --card-bg:#fff;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --border:#e2e8f0;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --q1:#ef4444;--q1bg:#fef2f2;--q1border:#fecaca;
  --q2:#3b82f6;--q2bg:#eff6ff;--q2border:#bfdbfe;
  --q3:#f59e0b;--q3bg:#fffbeb;--q3border:#fde68a;
  --q4:#22c55e;--q4bg:#f0fdf4;--q4border:#bbf7d0;
  --danger:#ef4444;
  --transition:.18s ease;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;display:flex;line-height:1.6;
  padding-bottom:var(--safe-bottom);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

.sidebar{
  width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform var(--transition);
  overflow-y:auto;padding-top:var(--safe-top);
  -webkit-overflow-scrolling:touch;
}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.06);}
.sidebar-header h2{font-size:18px;color:#fff;font-weight:700;letter-spacing:-.3px;}
.sidebar-header .ver{font-size:11px;color:var(--sidebar-text);margin-top:2px;}

.nav-section{padding:12px 0;}
.nav-label{padding:8px 20px 4px;font-size:11px;color:var(--sidebar-text);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;color:var(--sidebar-text);
  font-size:14px;font-weight:500;transition:all var(--transition);border-left:3px solid transparent;
  user-select:none;min-height:44px;
}
.nav-item:hover{background:var(--sidebar-hover);color:#d0d0e0;}
.nav-item.active{background:var(--sidebar-active);color:var(--sidebar-text-active);border-left-color:var(--primary);}
.nav-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.nav-item .badge{
  margin-left:auto;background:rgba(255,255,255,.1);color:var(--sidebar-text);font-size:11px;
  padding:2px 8px;border-radius:10px;font-weight:600;min-width:22px;text-align:center;
}
.nav-item.active .badge{background:var(--primary);color:#fff;}

.main{
  margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:28px 32px 60px;
  max-width:calc(100vw - var(--sidebar-w));
}
.view{display:none}
.view.active{display:block}

.view-header{margin-bottom:22px;}
.view-header h3{font-size:22px;font-weight:700;}

.form-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:20px;
}
.form-card h4{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:12px;}
.form-group:last-child{margin-bottom:0;}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:10px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:#f8fafc;color:var(--text);font-family:inherit;outline:none;transition:all var(--transition);
  -webkit-appearance:none;appearance:none;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{
  border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(79,110,247,.08);
}
.form-group textarea{resize:vertical;min-height:60px;}
.form-group select{background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%2364748b' stroke-width='2' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 18px;
  font-size:14px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;
  transition:all var(--transition);font-family:inherit;min-height:44px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#3b5de7;}
.btn-sm{padding:6px 14px;font-size:13px;min-height:36px;}
.btn-xs{padding:4px 10px;font-size:12px;min-height:32px;}
.btn-ghost{background:transparent;color:var(--text2);}
.btn-ghost:hover{background:#f1f5f9;}
.btn-ghost:active{background:#e2e8f0;}
.btn-danger{background:transparent;color:var(--danger);}
.btn-danger:hover{background:#fef2f2;}
.btn-danger:active{background:#fee2e2;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.toolbar .count{font-size:13px;color:var(--text2);}
.filter-btns{display:flex;gap:4px;}
.filter-btn{
  padding:6px 14px;font-size:13px;font-weight:500;border:1.5px solid var(--border);
  border-radius:20px;background:#fff;color:var(--text2);cursor:pointer;transition:all var(--transition);
  min-height:36px;touch-action:manipulation;
}
.filter-btn:active{transform:scale(.96);}
.filter-btn:hover{border-color:var(--primary);color:var(--primary);}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.schedule-list{display:flex;flex-direction:column;gap:8px;}
.schedule-item{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all var(--transition);
  border-left:3px solid transparent;cursor:default;
}
.schedule-item:active{background:#f8fafc;}
.schedule-item:hover{box-shadow:var(--shadow-md);}
.schedule-item.completed{opacity:.5;}
.schedule-item.completed .schedule-title{text-decoration:line-through;color:var(--text3);}
.schedule-item.Q1{border-left-color:var(--q1);}
.schedule-item.Q2{border-left-color:var(--q2);}
.schedule-item.Q3{border-left-color:var(--q3);}
.schedule-item.Q4{border-left-color:var(--q4);}
.schedule-item:not(.Q1):not(.Q2):not(.Q3):not(.Q4):not(.completed){border-left-color:var(--primary);}

.schedule-check{flex-shrink:0;margin-top:1px;}
.schedule-check input{display:none;}
.schedule-check label{
  display:block;width:24px;height:24px;border:2px solid #cbd5e1;border-radius:50%;cursor:pointer;
  transition:all var(--transition);position:relative;touch-action:manipulation;
}
.schedule-check label:active{transform:scale(.9);}
.schedule-check label:hover{border-color:var(--primary);}
.schedule-check input:checked+label{background:var(--q4);border-color:var(--q4);}
.schedule-check input:checked+label::after{
  content:"";position:absolute;left:7px;top:3px;width:6px;height:12px;
  border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);
}

.schedule-body{flex:1;min-width:0;}
.schedule-title{font-size:15px;font-weight:600;color:var(--text);word-break:break-word;}
.schedule-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:var(--text3);margin-top:3px;}
.schedule-meta .tag{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:4px;font-weight:500;font-size:11px;}
.tag-q1{background:var(--q1bg);color:var(--q1);}
.tag-q2{background:var(--q2bg);color:var(--q2);}
.tag-q3{background:var(--q3bg);color:var(--q3);}
.tag-q4{background:var(--q4bg);color:var(--q4);}
.tag-overdue{background:#fef2f2;color:#ef4444;}
.schedule-note{font-size:13px;color:var(--text2);margin-top:4px;word-break:break-word;}
.schedule-actions{display:flex;gap:6px;flex-shrink:0;}

.inbox-input-row{display:flex;gap:8px;}
.inbox-input-row input{flex:1;}
.inbox-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card-bg);
  border-radius:var(--radius-sm);box-shadow:var(--shadow);margin-bottom:6px;transition:all var(--transition);
}
.inbox-item:hover{box-shadow:var(--shadow-md);}
.inbox-item .inbox-title{flex:1;font-size:14px;word-break:break-word;}
.inbox-item .inbox-time{font-size:11px;color:var(--text3);white-space:nowrap;}

.quadrant-grid{
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:16px;min-height:400px;
}
.quadrant{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;
  display:flex;flex-direction:column;min-height:200px;
}
.quadrant-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);
}
.quadrant-header .q-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.quadrant-header .q-label{font-size:14px;font-weight:700;}
.quadrant-header .q-sub{font-size:12px;color:var(--text3);}
.quadrant-header .q-count{margin-left:auto;font-size:12px;color:var(--text3);background:#f1f5f9;padding:2px 8px;border-radius:10px;}
.q1 .q-dot{background:var(--q1);}.q1 .quadrant-header{border-color:var(--q1border);}
.q2 .q-dot{background:var(--q2);}.q2 .quadrant-header{border-color:var(--q2border);}
.q3 .q-dot{background:var(--q3);}.q3 .quadrant-header{border-color:var(--q3border);}
.q4 .q-dot{background:var(--q4);}.q4 .quadrant-header{border-color:var(--q4border);}
.quadrant-dropzone{flex:1;min-height:80px;border-radius:var(--radius-sm);transition:background var(--transition);}
.quadrant-dropzone.drag-over{background:#f1f5f9;}
.q-card{
  padding:12px;margin-bottom:6px;background:#f8fafc;border-radius:6px;font-size:14px;
  cursor:grab;transition:all var(--transition);border:1px solid transparent;display:flex;align-items:center;gap:8px;
  min-height:44px;-webkit-tap-highlight-color:transparent;
}
.q-card:hover{border-color:var(--border);box-shadow:var(--shadow);}
.q-card:active{cursor:grabbing;opacity:.7;}
.q-card.dragging{opacity:.4;}
.q-card .q-card-title{flex:1;font-weight:500;word-break:break-word;}
.q-card .q-card-time{font-size:12px;color:var(--text3);white-space:nowrap;}
.q-card.completed .q-card-title{text-decoration:line-through;color:var(--text3);}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-header .cal-month{font-size:18px;font-weight:700;}
.cal-header .cal-nav{display:flex;gap:8px;}
.cal-header .cal-nav button{
  width:40px;height:40px;border:1.5px solid var(--border);border-radius:50%;background:#fff;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);color:var(--text);touch-action:manipulation;
}
.cal-header .cal-nav button:active{transform:scale(.93);}
.cal-header .cal-nav button:hover{border-color:var(--primary);color:var(--primary);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;}
.cal-day-header{background:#f8fafc;padding:10px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);}
.cal-day{
  background:var(--card-bg);min-height:80px;padding:6px;cursor:pointer;transition:background var(--transition);
  position:relative;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.cal-day:active{background:#eef0ff;}
.cal-day:hover{background:#f8fafc;}
.cal-day.other-month{background:#fafbfc;color:var(--text3);}
.cal-day.today{background:var(--primary-light);}
.cal-day .day-num{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text2);}
.cal-day.today .day-num{background:var(--primary);color:#fff;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;}
.cal-day .day-events{display:flex;flex-direction:column;gap:2px;}
.cal-day .day-dot-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.cal-day .day-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cal-day .day-dot.Q1{background:var(--q1);}
.cal-day .day-dot.Q2{background:var(--q2);}
.cal-day .day-dot.Q3{background:var(--q3);}
.cal-day .day-dot.Q4{background:var(--q4);}
.cal-day .day-dot.none{background:#cbd5e1;}
.cal-day .day-event{
  font-size:11px;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:#f1f5f9;cursor:pointer;
}
.cal-day .day-event.Q1{background:var(--q1bg);color:var(--q1);}
.cal-day .day-event.Q2{background:var(--q2bg);color:var(--q2);}
.cal-day .day-event.Q3{background:var(--q3bg);color:var(--q3);}
.cal-day .day-event.Q4{background:var(--q4bg);color:var(--q4);}
.cal-day .day-more{font-size:11px;color:var(--primary);cursor:pointer;font-weight:600;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity var(--transition);
  -webkit-tap-highlight-color:transparent;
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:0 20px 50px rgba(0,0,0,.18);
  width:92%;max-width:500px;max-height:80vh;overflow-y:auto;padding:24px;
  -webkit-overflow-scrolling:touch;
}
.modal h4{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.modal .day-schedule-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-state .empty-icon{font-size:40px;margin-bottom:8px;opacity:.6;}
.empty-state p{font-size:14px;}

.hamburger{
  display:none;position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:300;
  width:48px;height:48px;border:none;border-radius:12px;background:var(--card-bg);
  box-shadow:var(--shadow-md);cursor:pointer;font-size:22px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.hamburger:active{background:#f1f5f9;transform:scale(.94);}

.convert-row{
  display:none;margin-top:8px;padding:10px;background:#f8fafc;border-radius:var(--radius-sm);
  flex-direction:column;gap:8px;
}
.convert-row.show{display:flex;}
.convert-row .convert-row-inner{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}

.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;
}

/* ============ SYNC ============ */
.sync-section{border-top:1px solid rgba(255,255,255,.06);margin-top:auto;padding-bottom:16px;}
.sync-status-item{position:relative;}
.sync-dot{
  width:8px;height:8px;border-radius:50%;margin-left:auto;flex-shrink:0;
  background:#94a3b8;transition:background var(--transition);
}
.sync-dot.configured{background:#f59e0b;}
.sync-dot.synced{background:#22c55e;}
.sync-dot.syncing{background:#3b82f6;animation:syncPulse .8s infinite;}
.sync-dot.error{background:#ef4444;}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.4}}

.sync-settings-panel{
  position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100vh;z-index:250;
  background:var(--card-bg);box-shadow:-4px 0 24px rgba(0,0,0,.15);
  transition:right var(--transition);display:flex;flex-direction:column;
  padding:24px;overflow-y:auto;
}
.sync-settings-panel.open{right:0;}
.sync-settings-panel h3{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.sync-settings-panel .close-btn{
  margin-left:auto;width:36px;height:36px;border:none;border-radius:50%;background:#f1f5f9;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.sync-settings-panel .close-btn:hover{background:#e2e8f0;}
.sync-settings-panel .sync-info{
  background:#f8fafc;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;
  font-size:13px;color:var(--text2);line-height:1.7;
}
.sync-settings-panel .sync-info strong{color:var(--text);}
.sync-settings-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:249;
  opacity:0;pointer-events:none;transition:opacity var(--transition);
}
.sync-settings-overlay.show{opacity:1;pointer-events:auto;}
@media(max-width:768px){
  .sync-settings-panel{width:100vw;max-width:100vw;right:-100vw;}
}

/* ==================== MOBILE ==================== */
@media(max-width:768px){
  :root{--sidebar-w:260px;}

  .sidebar{transform:translateX(-100%);width:var(--sidebar-w);box-shadow:4px 0 20px rgba(0,0,0,.2);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{display:block;opacity:0;pointer-events:none;transition:opacity var(--transition);}
  .sidebar-overlay.show{opacity:1;pointer-events:auto;}

  .main{margin-left:0;max-width:100vw;padding:64px 14px 40px;}
  .hamburger{display:flex;align-items:center;justify-content:center;}

  .view-header h3{font-size:20px;}
  .view-header{margin-bottom:16px;}

  .form-card{padding:16px;}
  .form-card h4{font-size:15px;margin-bottom:12px;}
  .form-row{grid-template-columns:1fr;gap:0;}

  .form-group label{font-size:13px;}
  .form-group input,.form-group textarea,.form-group select{
    font-size:16px;padding:12px 14px;
  }
  .form-group textarea{min-height:72px;}

  .btn{font-size:15px;min-height:48px;padding:12px 20px;}
  .btn-sm{font-size:14px;min-height:40px;padding:8px 14px;}
  .btn-xs{font-size:12px;min-height:34px;padding:5px 10px;}
  .filter-btn{font-size:13px;min-height:38px;padding:7px 14px;}

  .schedule-item{padding:14px 12px;gap:10px;}
  .schedule-title{font-size:15px;}
  .schedule-meta{font-size:12px;}
  .schedule-note{font-size:13px;}
  .schedule-check label{width:26px;height:26px;}
  .schedule-check input:checked+label::after{left:8px;top:3px;width:7px;height:13px;}
  .schedule-actions{gap:8px;}

  .inbox-input-row{gap:8px;}
  .inbox-input-row input{font-size:16px;padding:12px 14px;}
  .inbox-item{padding:14px;gap:8px;}
  .inbox-item .inbox-title{font-size:15px;}
  .convert-row .convert-row-inner{gap:6px;}

  .quadrant-grid{grid-template-columns:1fr;grid-template-rows:auto;gap:12px;min-height:auto;}
  .quadrant{padding:14px;min-height:140px;}
  .quadrant-header .q-label{font-size:14px;}

<script>

var STORAGE_KEY = 'schedule_tool_v2';
var items = [];
var currentView = 'inbox';
var allFilter = 'all';
var calYear, calMonth;

function loadData(){
  try{var r=localStorage.getItem(STORAGE_KEY);items=r?JSON.parse(r):[];}
  catch(e){items=[];}
}

function saveDataLocal(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
  localStorage.setItem(STORAGE_KEY+'_ts',new Date().toISOString());
}
function saveData(){
  saveDataLocal();
  if(isSyncConfigured())triggerSync();
}

// ==================== SYNC MODULE ====================
var SYNC_KEY = 'schedule_sync_config';
var GIST_FILENAME = 'schedule-data.json';
var syncTimer = null;
var syncDebounceMs = 2000;
var isSyncing = false;

function getSyncConfig(){
  try{var r=localStorage.getItem(SYNC_KEY);return r?JSON.parse(r):{token:'',gistId:''};}
  catch(e){return {token:'',gistId:''};}
}
function saveSyncConfig(cfg){localStorage.setItem(SYNC_KEY,JSON.stringify(cfg));}

function isSyncConfigured(){
  var c=getSyncConfig();
  return !!(c.token && c.gistId);
}

function updateSyncUI(){
  var c=getSyncConfig();
  var dot=document.getElementById('syncDot');
  var txt=document.getElementById('syncStatusText');
  var btn=document.getElementById('manualSyncBtn');
  if(!dot||!txt)return;
  dot.className='sync-dot';
  if(!c.token||!c.gistId){
    txt.textContent='未配置';
    if(btn)btn.style.display='none';
  }else{
    dot.classList.add('configured');
    txt.textContent='已配置';
    if(btn)btn.style.display='';
  }
}

function openSyncSettings(){
  var c=getSyncConfig();
  var tokenEl=document.getElementById('githubToken');
  var gistEl=document.getElementById('gistId');
  if(tokenEl)tokenEl.value=c.token||'';
  if(gistEl)gistEl.value=c.gistId||'';
  updateSyncInfoBox();
  document.getElementById('syncSettingsPanel').classList.add('open');
  document.getElementById('syncSettingsOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSyncSettings(){
  document.getElementById('syncSettingsPanel').classList.remove('open');
  document.getElementById('syncSettingsOverlay').classList.remove('show');
  document.body.style.overflow='';
}

function updateSyncInfoBox(){
  var c=getSyncConfig();
  var box=document.getElementById('syncInfoBox');
  if(!box)return;
  if(!c.token||!c.gistId){
    box.innerHTML='尚未配置 GitHub Gist 同步。<br><small>输入 Token 后保存，系统将自动创建 Gist 存储数据。</small>';
  }else{
    box.innerHTML='<strong>已配置</strong><br>Gist ID: <code>'+esc(c.gistId)+'</code><br><small>数据变更将自动同步到 Gist</small>';
  }
}

function setSyncStatus(status){
  var dot=document.getElementById('syncDot');
  var txt=document.getElementById('syncStatusText');
  if(!dot||!txt)return;
  dot.className='sync-dot';
  switch(status){
    case 'syncing':dot.classList.add('syncing');txt.textContent='同步中...';break;
    case 'synced':dot.classList.add('synced');txt.textContent='已同步';break;
    case 'error':dot.classList.add('error');txt.textContent='同步失败';break;
    default:dot.classList.add('configured');txt.textContent='已配置';
  }
}

async function gistApi(method, gistId, data){
  var c=getSyncConfig();
  if(!c.token)throw new Error('Token not configured');
  var url=gistId?'https://api.github.com/gists/'+gistId:'https://api.github.com/gists';
  var opts={method:method,headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json'}};
  if(data){opts.body=JSON.stringify(data);opts.headers['Content-Type']='application/json';}
  var resp=await fetch(url,opts);
  if(!resp.ok){var err=await resp.json().catch(function(){return{};});throw new Error(err.message||'HTTP '+resp.status);}
  return resp.json();
}

function buildGistData(){
  return {
    inbox:items.filter(function(i){return i.inbox;}),
    schedules:items.filter(function(i){return !i.inbox;}),
    updatedAt:new Date().toISOString()
  };
}

function mergeFromGist(gistData){
  var gistInbox=gistData.inbox||[];
  var gistSchedules=gistData.schedules||[];
  var gistUpdated=gistData.updatedAt||'';
  var localUpdated=localStorage.getItem(STORAGE_KEY+'_ts')||'';
  if(gistUpdated&&localUpdated&&gistUpdated<=localUpdated)return false;
  items=gistInbox.concat(gistSchedules);
  localStorage.setItem(STORAGE_KEY+'_ts',gistUpdated||new Date().toISOString());
  saveDataLocal();
  return true;
}

function triggerSync(){
  if(!isSyncConfigured())return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushToGist,syncDebounceMs);
}

async function pushToGist(){
  if(isSyncing||!isSyncConfigured())return;
  isSyncing=true;
  setSyncStatus('syncing');
  try{
    var c=getSyncConfig();
    var data=buildGistData();
    var gistData={description:'日程管理工具数据',files:{}};
    gistData.files[GIST_FILENAME]={content:JSON.stringify(data,null,2)};
    await gistApi('PATCH',c.gistId,gistData);
    setSyncStatus('synced');
  }catch(e){
    console.error('Sync push failed:',e);
    setSyncStatus('error');
  }finally{isSyncing=false;}
}

async function pullFromGist(){
  if(!isSyncConfigured())return;
  try{
    var c=getSyncConfig();
    var gist=await gistApi('GET',c.gistId);
    var file=gist.files&&gist.files[GIST_FILENAME];
    if(!file||!file.content)return;
    var gistData=JSON.parse(file.content);
    if(mergeFromGist(gistData))renderAll();
  }catch(e){console.error('Sync pull failed:',e);}
}

async function manualSync(){
  if(!isSyncConfigured()){openSyncSettings();return;}
  setSyncStatus('syncing');
  try{
    await pullFromGist();
    await pushToGist();
    setSyncStatus('synced');
    renderAll();
  }catch(e){
    console.error('Manual sync failed:',e);
    setSyncStatus('error');
  }
}

async function saveSyncSettings(){
  var tokenEl=document.getElementById('githubToken');
  var token=tokenEl?tokenEl.value.trim():'';
  if(!token){alert('请输入 GitHub Token');return;}
  var gistIdEl=document.getElementById('gistId');
  var gistId=gistIdEl?gistIdEl.value.trim():'';
  var c=getSyncConfig();
  var oldToken=c.token;
  c.token=token;
  if(!gistId){
    try{
      var data=buildGistData();
      var gistData={description:'日程管理工具数据',public:false,files:{}};
      gistData.files[GIST_FILENAME]={content:JSON.stringify(data,null,2)};
      saveSyncConfig(c);
      var result=await gistApi('POST','',gistData);
      c.gistId=result.id;
      saveSyncConfig(c);
      if(gistIdEl)gistIdEl.value=c.gistId;
      gistIdEl.removeAttribute('readonly');
      gistIdEl.style.color='';
      updateSyncInfoBox();
      updateSyncUI();
      setSyncStatus('synced');
      localStorage.setItem(STORAGE_KEY+'_ts',new Date().toISOString());
    }catch(e){
      alert('创建 Gist 失败: '+e.message);
      c.token=oldToken||'';
      c.gistId='';
      saveSyncConfig(c);
    }
  }else{
    c.gistId=gistId;
    saveSyncConfig(c);
    updateSyncInfoBox();
    updateSyncUI();
    setSyncStatus('configured');
    triggerSync();
  }
}

async function testSyncConnection(){
  var tokenEl=document.getElementById('githubToken');
  var token=tokenEl?tokenEl.value.trim():'';
  if(!token){alert('请先输入 Token');return;}
  var gistIdEl=document.getElementById('gistId');
  var gistId=gistIdEl?gistIdEl.value.trim():'';
  var orig=getSyncConfig();
  var testCfg={token:token,gistId:gistId||''};
  saveSyncConfig(testCfg);
  try{
    if(gistId){
      await gistApi('GET',gistId);
    }else{
      var resp=await fetch('https://api.github.com/user',{headers:{'Authorization':'token '+token}});
      if(!resp.ok)throw new Error('Token 无效');
    }
    saveSyncConfig(orig);
    alert('连接成功！');
  }catch(e){
    saveSyncConfig(orig);
    alert('连接失败: '+e.message);
  }
}

function disconnectSync(){
  if(!confirm('确定要断开同步吗？本地数据不会丢失。'))return;
  saveSyncConfig({token:'',gistId:''});
  var tokenEl=document.getElementById('githubToken');
  var gistEl=document.getElementById('gistId');
  if(tokenEl)tokenEl.value='';
  if(gistEl){gistEl.value='';gistEl.setAttribute('readonly','');gistEl.style.color='var(--text3)';}
  updateSyncInfoBox();
  updateSyncUI();
  closeSyncSettings();
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtDate(d,t){if(!d)return t||'未设定';var p=d.split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日'+(t?' '+t:'');}
function isOverdue(s){if(s.completed||!s.date)return false;var dt=s.time?s.date+'T'+s.time:s.date+'T23:59';return new Date(dt)<new Date();}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sortByTime(arr){
  return arr.slice().sort(function(a,b){
    if(!a.date&&!b.date)return b.createdAt.localeCompare(a.createdAt);
    if(!a.date)return 1;if(!b.date)return -1;
    var da=a.time?a.date+'T'+a.time:a.date+'T23:59';
    var db=b.time?b.date+'T'+b.time:b.date+'T23:59';
    return da.localeCompare(db);
  });
}
function isMobile(){return window.innerWidth<=768;}

function switchView(view){
  currentView=view;
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(v){v.classList.remove('active');});
  var target=document.getElementById('view-'+view);
  if(target)target.classList.add('active');
  var nav=document.querySelector('[data-view="'+view+'"]');
  if(nav)nav.classList.add('active');
  if(isMobile())closeSidebar();
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
  document.body.style.overflow=sb.classList.contains('open')?'hidden':'';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  document.body.style.overflow='';
}

function updateBadges(){
  document.getElementById('badgeInbox').textContent=items.filter(function(i){return i.inbox;}).length;
  document.getElementById('badgeAll').textContent=items.filter(function(i){return !i.inbox;}).length;
}

function setupInputScroll(){
  document.querySelectorAll('input, textarea, select').forEach(function(el){
    el.addEventListener('focus',function(){
      if(!isMobile())return;
      setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'center'});},350);
    });
  });
}

// ==================== INBOX ====================
function addInbox(){
  var inp=document.getElementById('inboxInput');
  var v=inp.value.trim();
  if(!v)return;
  items.push({id:genId(),title:v,date:'',time:'',note:'',completed:false,quadrant:null,inbox:true,createdAt:new Date().toISOString()});
  inp.value='';saveData();renderAll();inp.focus();
}
function inboxToSchedule(id){
  var item=items.find(function(i){return i.id===id;});
  if(!item)return;
  item.date=(document.getElementById('convDate-'+id)||{}).value||'';
  item.time=(document.getElementById('convTime-'+id)||{}).value||'';
  item.quadrant=(document.getElementById('convQ-'+id)||{}).value||null;
  item.inbox=false;
  saveData();renderAll();
}
function toggleConvertRow(id){
  var row=document.getElementById('convert-'+id);
  if(!row)return;
  row.classList.toggle('show');
  var item=items.find(function(i){return i.id===id;});
  if(item&&!item.date){
    var d=document.getElementById('convDate-'+id);
    if(d&&!d.value)d.value=new Date().toISOString().split('T')[0];
  }
  if(row.classList.contains('show')&&isMobile()){
    setTimeout(function(){row.scrollIntoView({behavior:'smooth',block:'center'});},200);
  }
}
function deleteInboxItem(id){items=items.filter(function(i){return i.id!==id;});saveData();renderAll();}

function renderInbox(){
  var list=document.getElementById('inboxList');
  var inboxItems=items.filter(function(i){return i.inbox;});
  if(!inboxItems.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">&#128232;</div><p>收集箱为空，快速记录你的想法吧</p></div>';
    return;
  }
  list.innerHTML=inboxItems.sort(function(a,b){return b.createdAt.localeCompare(a.createdAt);}).map(function(s){
    var dt=new Date(s.createdAt);
    var ts=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
    return '<div class="inbox-item">'+
      '<span class="inbox-title">'+esc(s.title)+'</span>'+
      '<span class="inbox-time">'+ts+'</span>'+
      '<button class="btn btn-xs btn-outline" onclick="toggleConvertRow(\''+s.id+'\')">转为日程</button>'+
      '<button class="btn btn-xs btn-danger" onclick="deleteInboxItem(\''+s.id+'\')">删除</button>'+
    '</div>'+
    '<div class="convert-row" id="convert-'+s.id+'">'+
      '<div class="convert-row-inner">'+
        '<div class="form-group"><label>日期</label><input type="date" id="convDate-'+s.id+'"></div>'+
        '<div class="form-group"><label>时间</label><input type="time" id="convTime-'+s.id+'"></div>'+
        '<div class="form-group"><label>象限</label>'+
          '<select id="convQ-'+s.id+'">'+
            '<option value="">不分配</option>'+
            '<option value="Q1">重要且紧急</option><option value="Q2">重要不紧急</option>'+
            '<option value="Q3">紧急不重要</option><option value="Q4">不重要不紧急</option>'+
          '</select></div>'+
        '<button class="btn btn-sm btn-primary" onclick="inboxToSchedule(\''+s.id+'\')">确认转换</button>'+
      '</div></div>';
  }).join('');
}

// ==================== ALL SCHEDULES ====================
function addAllSchedule(){
  var t=document.getElementById('allTitle').value.trim();
  if(!t){document.getElementById('allTitle').focus();return;}
  items.push({
    id:genId(),title:t,
    date:document.getElementById('allDate').value,
    time:document.getElementById('allTime').value,
    note:document.getElementById('allNote').value.trim(),
    completed:false,quadrant:document.getElementById('allQuadrant').value||null,
    inbox:false,createdAt:new Date().toISOString()
  });
  ['allTitle','allDate','allTime','allNote'].forEach(function(x){document.getElementById(x).value='';});
  document.getElementById('allQuadrant').value='';
  saveData();renderAll();
}
function toggleComplete(id){var s=items.find(function(i){return i.id===id;});if(s){s.completed=!s.completed;saveData();renderAll();}}
function deleteSchedule(id){items=items.filter(function(i){return i.id!==id;});saveData();renderAll();}
function setAllFilter(f){allFilter=f;renderAll();}
function editSchedule(id){
  var s=items.find(function(i){return i.id===id;});if(!s)return;
  var L={Q1:'重要且紧急',Q2:'重要不紧急',Q3:'紧急不重要',Q4:'不重要不紧急'};
  showModal(
    '<h4>编辑日程</h4>'+
    '<div class="form-group"><label>标题</label><input type="text" id="editTitle" value="'+esc(s.title)+'" maxlength="100" autocomplete="off"></div>'+
    '<div class="form-row">'+
      '<div class="form-group"><label>日期</label><input type="date" id="editDate" value="'+(s.date||'')+'"></div>'+
      '<div class="form-group"><label>时间</label><input type="time" id="editTime" value="'+(s.time||'')+'"></div>'+
    '</div>'+
    '<div class="form-group"><label>象限</label><select id="editQuadrant">'+
      '<option value="">不分配</option>'+
      '<option value="Q1" '+(s.quadrant==='Q1'?'selected':'')+'>'+L.Q1+'</option>'+
      '<option value="Q2" '+(s.quadrant==='Q2'?'selected':'')+'>'+L.Q2+'</option>'+
      '<option value="Q3" '+(s.quadrant==='Q3'?'selected':'')+'>'+L.Q3+'</option>'+
      '<option value="Q4" '+(s.quadrant==='Q4'?'selected':'')+'>'+L.Q4+'</option>'+
    '</select></div>'+
    '<div class="form-group"><label>备注</label><textarea id="editNote" maxlength="500">'+esc(s.note||'')+'</textarea></div>'+
    '<div class="modal-actions">'+
      '<button class="btn btn-sm btn-danger" onclick="deleteSchedule(\''+s.id+'\');closeModal()">删除</button>'+
      '<button class="btn btn-sm btn-ghost" onclick="closeModal()">取消</button>'+
      '<button class="btn btn-sm btn-primary" onclick="saveEdit(\''+s.id+'\')">保存</button>'+
    '</div>'
  );
  setTimeout(function(){setupInputScroll();},100);
}
function saveEdit(id){
  var s=items.find(function(i){return i.id===id;});if(!s)return;
  s.title=document.getElementById('editTitle').value.trim()||s.title;
  s.date=document.getElementById('editDate').value;
  s.time=document.getElementById('editTime').value;
  s.quadrant=document.getElementById('editQuadrant').value||null;
  s.note=document.getElementById('editNote').value.trim();
  saveData();closeModal();renderAll();
}

function renderAllSchedules(){
  var list=document.getElementById('allList');
  var arr=items.filter(function(i){return !i.inbox;});
  var total=arr.length;
  var pending=arr.filter(function(i){return !i.completed;}).length;
  if(allFilter==='pending')arr=arr.filter(function(i){return !i.completed;});
  if(allFilter==='done')arr=arr.filter(function(i){return i.completed;});
  arr=sortByTime(arr);
  document.getElementById('allCount').innerHTML='共 <strong>'+total+'</strong> 条，<strong>'+pending+'</strong> 条待完成';
  document.querySelectorAll('#view-all .filter-btn').forEach(function(b){
    var t=b.textContent.trim();
    b.classList.toggle('active',(allFilter==='all'&&t==='全部')||(allFilter==='pending'&&t==='待完成')||(allFilter==='done'&&t==='已完成'));
  });
  if(!arr.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">&#128203;</div><p>'+(allFilter==='all'?'暂无日程，快添加一个吧':allFilter==='pending'?'所有日程已完成':'暂无已完成日程')+'</p></div>';
    return;
  }
  var L={Q1:'重要紧急',Q2:'重要不紧急',Q3:'紧急不重要',Q4:'不重要不紧急'};
  list.innerHTML=arr.map(function(s){
    var tag='';
    if(s.quadrant)tag='<span class="tag tag-'+s.quadrant.toLowerCase()+'">'+L[s.quadrant]+'</span>';
    if(!s.completed&&isOverdue(s))tag+='<span class="tag tag-overdue">已过期</span>';
    return '<div class="schedule-item'+(s.completed?' completed':'')+' '+(s.quadrant||'')+'" ontouchstart="" onclick="if(isMobile())editSchedule(\''+s.id+'\')" ondblclick="if(!isMobile())editSchedule(\''+s.id+'\')">'+
      '<div class="schedule-check">'+
        '<input type="checkbox" id="chk'+s.id+'" '+(s.completed?'checked':'')+' onchange="toggleComplete(\''+s.id+'\')">'+
        '<label for="chk'+s.id+'"></label></div>'+
      '<div class="schedule-body">'+
        '<div class="schedule-title">'+esc(s.title)+'</div>'+
        '<div class="schedule-meta"><span>'+(s.date?fmtDate(s.date,s.time):'未设定时间')+'</span>'+tag+'</div>'+
        (s.note?'<div class="schedule-note">'+esc(s.note)+'</div>':'')+
      '</div>'+
      '<div class="schedule-actions">'+
        '<button class="btn btn-xs btn-outline" onclick="event.stopPropagation();editSchedule(\''+s.id+'\')">编辑</button>'+
        '<button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteSchedule(\''+s.id+'\')">删除</button>'+
      '</div></div>';
  }).join('');
}

// ==================== QUADRANT ====================
var dragId=null;
function handleDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function handleDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function handleDrop(e,q){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragId)return;
  var s=items.find(function(i){return i.id===dragId;});if(!s)return;
  s.quadrant=q;s.inbox=false;dragId=null;saveData();renderAll();
}
function startDrag(e,id){if(isMobile())return;dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(function(){e.target.classList.add('dragging');},0);}
function endDrag(e){e.target.classList.remove('dragging');dragId=null;}

function renderQuadrant(){
  var quads={Q1:[],Q2:[],Q3:[],Q4:[]};
  items.filter(function(i){return !i.inbox&&i.quadrant;}).forEach(function(s){quads[s.quadrant].push(s);});
  ['Q1','Q2','Q3','Q4'].forEach(function(q){
    var arr=sortByTime(quads[q]);
    document.getElementById('qCount'+q.slice(1)).textContent=arr.length;
    var zone=document.getElementById('drop'+q);
    if(!arr.length){
      zone.innerHTML='<div style="text-align:center;color:var(--text3);padding:24px 8px;font-size:13px;">拖拽日程到此处</div>';
    }else{
      zone.innerHTML=arr.map(function(s){
        return '<div class="q-card'+(s.completed?' completed':'')+'" draggable="true" '+
          'ondragstart="startDrag(event,\''+s.id+'\')" ondragend="endDrag(event)" '+
          'ontouchstart="" onclick="if(isMobile())editSchedule(\''+s.id+'\')" ondblclick="if(!isMobile())editSchedule(\''+s.id+'\')">'+
          '<span class="q-card-title">'+esc(s.title)+'</span>'+
          '<span class="q-card-time">'+(s.date?fmtDate(s.date,s.time):'')+'</span>'+
        '</div>';
      }).join('');
    }
  });
}

// ==================== CALENDAR ====================
function renderCalendar(){
  var grid=document.getElementById('calGrid');
  var label=document.getElementById('calMonthLabel');
  var WD=['一','二','三','四','五','六','日'];

  var firstDay=new Date(calYear,calMonth,1);
  var startDow=(firstDay.getDay()+6)%7;
  var dim=new Date(calYear,calMonth+1,0).getDate();
  var pdim=new Date(calYear,calMonth,0).getDate();

  label.textContent=calYear+'年'+(calMonth+1)+'月';
  var html=WD.map(function(d){return '<div class="cal-day-header">'+d+'</div>';}).join('');
  var totalCells=Math.ceil((startDow+dim)/7)*7;

  var today=new Date();
  var todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  var dm={};
  items.filter(function(i){return !i.inbox&&i.date;}).forEach(function(s){
    if(!dm[s.date])dm[s.date]=[];
    dm[s.date].push(s);
  });

  var mobile=isMobile();
  var maxE=mobile?2:3;

  for(var i=0;i<totalCells;i++){
    var dn,ds,io=false;
    if(i<startDow){dn=pdim-startDow+i+1;var dd=new Date(calYear,calMonth-1,dn);ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');io=true;}
    else if(i>=startDow+dim){dn=i-startDow-dim+1;var dd=new Date(calYear,calMonth+1,dn);ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');io=true;}
    else{dn=i-startDow+1;ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');}
    var isToday=ds===todayStr;
    var ae=(dm[ds]||[]);
    var ev=ae.slice(0,maxE);
    var mc=ae.length-maxE;

    var eh='';
    if(mobile){
      eh='<div class="day-dot-row">'+ev.map(function(e){return '<span class="day-dot '+(e.quadrant||'none')+'"></span>';}).join('')+(mc>0?'<span style="font-size:10px;color:var(--primary)">+'+mc+'</span>':'')+'</div>';
    }else{
      eh='<div class="day-events">'+ev.map(function(e){return '<div class="day-event '+(e.quadrant||'')+'">'+esc(e.title)+'</div>';}).join('')+(mc>0?'<div class="day-more">+'+mc+' 更多</div>':'')+'</div>';
    }
    html+='<div class="cal-day'+(io?' other-month':'')+(isToday?' today':'')+'" onclick="openDayModal(\''+ds+'\')"><div class="day-num">'+dn+'</div>'+eh+'</div>';
  }
  grid.innerHTML=html;
}

function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function goToday(){var t=new Date();calYear=t.getFullYear();calMonth=t.getMonth();renderCalendar();}

function openDayModal(dateStr){
  var di=items.filter(function(i){return !i.inbox&&i.date===dateStr;});
  var d=new Date(dateStr+'T00:00');
  var ls=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  var L={Q1:'重要紧急',Q2:'重要不紧急',Q3:'紧急不重要',Q4:'不重要不紧急'};
  var ih='';
  if(!di.length){
    ih='<div class="empty-state" style="padding:16px"><p>当天无日程</p></div>';
  }else{
    ih='<div class="day-schedule-list">'+sortByTime(di).map(function(s){
      var tag=s.quadrant?'<span class="tag tag-'+s.quadrant.toLowerCase()+'">'+L[s.quadrant]+'</span>':'';
      return '<div class="schedule-item '+(s.completed?'completed':'')+' '+(s.quadrant||'')+'">'+
        '<div class="schedule-check"><input type="checkbox" id="calchk'+s.id+'" '+(s.completed?'checked':'')+' onchange="toggleComplete(\''+s.id+'\');openDayModal(\''+dateStr+'\')"><label for="calchk'+s.id+'"></label></div>'+
        '<div class="schedule-body"><div class="schedule-title">'+esc(s.title)+'</div><div class="schedule-meta"><span>'+(s.time||'')+'</span>'+tag+'</div>'+(s.note?'<div class="schedule-note">'+esc(s.note)+'</div>':'')+'</div>'+
        '<div class="schedule-actions"><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteSchedule(\''+s.id+'\');openDayModal(\''+dateStr+'\')">删除</button></div></div>';
    }).join('')+'</div>';
  }
  showModal(
    '<h4>&#128197; '+ls+'</h4>'+
    '<div class="form-group" style="display:flex;gap:8px;"><input type="text" id="quickTitle" placeholder="快速添加当天日程……" maxlength="100" autocomplete="off" style="flex:1;"><button class="btn btn-sm btn-primary" onclick="quickAdd(\''+dateStr+'\')">添加</button></div>'+
    '<div class="form-row"><div class="form-group"><input type="time" id="quickTime"></div><div class="form-group"><select id="quickQuadrant"><option value="">象限</option><option value="Q1">重要紧急</option><option value="Q2">重要不紧急</option><option value="Q3">紧急不重要</option><option value="Q4">不重要不紧急</option></select></div></div>'+ih
  );
  setTimeout(function(){setupInputScroll();},100);
}
function quickAdd(dateStr){
  var t=document.getElementById('quickTitle');if(!t||!t.value.trim())return;
  var q=document.getElementById('quickQuadrant'),tm=document.getElementById('quickTime');
  items.push({id:genId(),title:t.value.trim(),date:dateStr,time:tm?tm.value:'',note:'',completed:false,quadrant:q?q.value||null:null,inbox:false,createdAt:new Date().toISOString()});
  saveData();openDayModal(dateStr);
}

function showModal(html){
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow='';
  renderAll();
}

function renderAll(){
  updateBadges();
  if(currentView==='inbox')renderInbox();
  if(currentView==='all')renderAllSchedules();
  if(currentView==='quadrant')renderQuadrant();
  if(currentView==='calendar')renderCalendar();
}

// ==================== INIT ====================
loadData();
updateSyncUI();
var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
document.getElementById('allDate').value=now.toISOString().split('T')[0];
document.getElementById('inboxInput').addEventListener('keydown',function(e){if(e.key==='Enter')addInbox();});
document.getElementById('allTitle').addEventListener('keydown',function(e){if(e.key==='Enter')addAllSchedule();});
setupInputScroll();
renderAll();

if(isSyncConfigured()){
  pullFromGist().then(function(){updateSyncUI();});
}

var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){
    if(currentView==='calendar')renderCalendar();
    if(currentView==='quadrant')renderQuadrant();
  },250);
});

document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeSidebar();closeSyncSettings();}});
</script>
